<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Edit Apartment</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="edit-container">

<h2>✏️ Редактирование квартиры</h2>

<input id="district" placeholder="Район">

<input id="street" placeholder="Улица">

<input id="rooms" type="number" placeholder="Комнаты">

<input id="bedrooms" type="number" placeholder="Спальни">

<input id="area" placeholder="Площадь">

<input id="floor" placeholder="Этаж">

<input id="price" placeholder="Цена">

<textarea id="description" placeholder="Описание"></textarea>

<button id="saveBtn">
💾 Сохранить
</button>

</div>

<script src="edit.js"></script>

</body>
</html>
