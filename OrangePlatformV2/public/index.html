<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍊 Orange Real Estate</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<header>

    <div class="logo">
        🍊 Orange Real Estate
    </div>

</header>

<section class="filters">

    <
        <select
        id="districtFilter"
        onchange="filterPosts()">

        <option value="">Все районы</option>
<option value="сабуртало">Saburtalo</option>
<option value="ваке">Vake</option>
<option value="вера">Vera</option>
<option value="исани">Isani</option>
<option value="дигоми">Didi Digomi</option>
<option value="крцаниси">Krtsanisi</option>
<option value="ортачала">Ortachala</option>

    </select>

    <select
        id="roomsFilter"
        onchange="filterPosts()">

        <option value="">Комнаты</option>

        <option value="1">1</option>

        <option value="2">2</option>

        <option value="3">3</option>

        <option value="4">4</option>

        <option value="5">5+</option>

    </select>

    <input
        id="minPrice"
        type="number"
        placeholder="Цена от"
        onkeyup="filterPosts()"
    >

    <input
        id="maxPrice"
        type="number"
        placeholder="Цена до"
        onkeyup="filterPosts()"
    >

</section>

<div id="posts" class="grid">

    Загрузка...

</div>

<script src="app.js"></script>

</body>
</html>
