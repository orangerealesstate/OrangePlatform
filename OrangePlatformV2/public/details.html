<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Real Estate</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    🍊 Orange Real Estate
</header>

<div id="content" class="loading">

    <div class="skeleton">

        <div class="skeleton-image"></div>

        <div class="skeleton-card"></div>

        <div class="skeleton-card"></div>

        <div class="skeleton-card"></div>

    </div>

</div>

<!-- ფოტოების Viewer -->
<div id="viewer" class="viewer" style="display:none;">

   <span class="close" onclick="closeImage()">&times;</span>

    <span class="prev" onclick="prevImage()">&lsaquo;</span>

    <img id="viewerImage">

    <span class="next" onclick="nextImage()">&rsaquo;</span>

</div>
<!-- Bottom Action Bar -->
<div class="bottom-bar">

    <button id="shareBtn" class="action-btn share-btn">
        📤 Поделиться
    </button>

    <button id="mapBtn" class="action-btn map-btn">
        🗺 Карта
    </button>

    <button id="agentBtn" class="action-btn contact-btn">
        💬 Агент
    </button>

</div>
<script src="details.js?v=2"></script>

</body>
</html>
